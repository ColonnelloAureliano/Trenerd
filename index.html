<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binario con Luci</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <!-- Parte superiore con immagine -->
    <section class="top-area">
      <img src="immagine.png" alt="Immagine principale" class="top-image" />
    </section>

    <!-- Parte inferiore con binario e luci -->
    <section class="bottom-area">
      <div class="track-wrapper">
        <div class="track">
          <div class="rail rail-top"></div>
          <div class="rail rail-bottom"></div>

          <div class="sleepers">
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
          </div>

          <div class="lights">
            <button class="light off" aria-label="Luce 1"></button>
            <button class="light off" aria-label="Luce 2"></button>
            <button class="light off" aria-label="Luce 3"></button>
            <button class="light off" aria-label="Luce 4"></button>
            <button class="light off" aria-label="Luce 5"></button>
            <button class="light off" aria-label="Luce 6"></button>
            <button class="light off" aria-label="Luce 7"></button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
