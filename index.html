<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRENerd - Segnale Segreto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page" id="page">
    <section class="top-area">
      <div class="image-card">
        <img src="immagine.png" alt="Logo TRENerd" class="top-image" />
      </div>
    </section>

    <section class="bottom-area">
      <div class="track-scene">
        <div class="track" aria-label="Binario con 7 luci interattive">

          <!-- Traverse -->
          <div class="sleepers">
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
            <div class="sleeper"></div>
          </div>

          <!-- Rotaie -->
          <div class="rail rail-top"></div>
          <div class="rail rail-bottom"></div>

          <!-- Luci -->
          <div class="lights" id="lights">
            <button class="light off" aria-label="Luce 1"></button>
            <button class="light off" aria-label="Luce 2"></button>
            <button class="light off" aria-label="Luce 3"></button>
            <button class="light off" aria-label="Luce 4"></button>
            <button class="light off" aria-label="Luce 5"></button>
            <button class="light off" aria-label="Luce 6"></button>
            <button class="light off" aria-label="Luce 7"></button>
          </div>

        </div>
      </div>
    </section>
  </main>

  <section class="secret-screen" id="secretScreen" aria-hidden="true">
    <div class="secret-content">
      <div class="secret-glow"></div>
      <h1>SEGRETO</h1>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
